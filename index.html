<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Auditoria honesta · @laisemesquita · WLC</title>
<link rel="stylesheet" href="_kit/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sidebar-w: 230px;
  }

  body {
    background: var(--bg);
    color: var(--fg1);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .app {
    width: 100%;
    max-width: none;
    margin: 0;
    display: flex;
    align-items: flex-start;
    background: var(--bg);
  }

  /* ============================================================
     SIDEBAR
     ============================================================ */
  .sidebar {
    width: var(--sidebar-w);
    flex: 0 0 var(--sidebar-w);
    align-self: stretch;
    background: var(--wlc-space-cadet);
    color: var(--wlc-alabaster);
    padding: 28px 18px 32px;
    position: sticky;
    top: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }
  .sb-logo-wrap {
    background: var(--wlc-skobeloff);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 16px 16px;
    display: flex; justify-content: center;
  }
  .sb-logo { width: 100%; max-width: 168px; height: auto; display: block; }

  .sb-section-label {
    font-family: var(--font-sans); font-weight: 700;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--wlc-powder-blue);
    padding: 0 8px 4px;
  }
  .sb-nav { display: flex; flex-direction: column; gap: 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px;
    border-radius: 14px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
    border: 1px solid transparent;
    border-left: 4px solid transparent;
    transition: background .15s;
  }
  .nav-item:hover { background: rgba(255,255,255,0.10); }
  .nav-item .nav-ic {
    width: 30px; height: 30px; flex: 0 0 auto;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--wlc-powder-blue);
    background: rgba(255,255,255,0.07);
    border-radius: 9px; padding: 5px;
  }
  .nav-item .nav-ic svg { width: 100%; height: 100%; display: block; }
  .nav-text { display: flex; flex-direction: column; line-height: 1.1; min-width: 0; }
  .nav-name { font-family: var(--font-sans); font-weight: 600; font-size: 15px; color: var(--wlc-alabaster); }
  .nav-metric {
    font-family: var(--font-numeral); font-size: 15px;
    color: var(--wlc-powder-blue); margin-top: 3px; letter-spacing: 0.01em;
  }
  .nav-item.active {
    background: rgba(231,64,65,0.18);
    border-left-color: var(--wlc-imperial-red);
  }
  .nav-item.active .nav-ic { color: var(--wlc-imperial-red); background: rgba(231,64,65,0.18); }
  .nav-item.active .nav-name { color: #fff; }
  .nav-item.active .nav-metric { color: var(--wlc-chinese-yellow); }

  .sb-meta-card {
    margin-top: auto;
    background: rgba(231,64,65,0.14);
    border: 1px solid rgba(231,64,65,0.34);
    border-radius: 16px;
    padding: 16px;
  }
  .sb-meta-card .lbl { font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--wlc-chinese-yellow); }
  .sb-meta-card .big { font-family: var(--font-numeral); font-size: 38px; line-height: 1; color: #fff; margin: 8px 0 2px; }
  .sb-meta-card .small { font-family: var(--font-sans); font-weight: 500; font-size: 12.5px; line-height: 1.4; color: var(--wlc-powder-blue); }

  /* ============================================================
     CONTENT COLUMN
     ============================================================ */
  .content { flex: 1; min-width: 0; width: 100%; max-width: none; }

  /* ---- TOPBAR ---- */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 22px 40px 20px;
    display: flex; align-items: center; gap: 24px;
  }
  .topbar-titles { flex: 1; min-width: 0; }
  .topbar-title {
    font-family: var(--font-chalk);
    font-size: 46px; line-height: 0.98;
    color: var(--fg1);
  }
  .topbar-title .red { color: var(--wlc-imperial-red); }
  .topbar-sub { font-family: var(--font-sans); font-weight: 500; font-size: 14.5px; color: var(--fg2); margin-top: 6px; }

  .topbar-controls { display: flex; align-items: center; gap: 14px; flex: 0 0 auto; }
  .week-select-wrap { display: flex; flex-direction: column; gap: 4px; }
  .week-select-wrap label { font-family: var(--font-sans); font-weight: 700; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg2); }
  select#weekSelect {
    font-family: var(--font-sans); font-weight: 600; font-size: 14px;
    color: var(--fg1); background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 10px 18px; cursor: pointer; outline: none;
    box-shadow: var(--shadow-sm);
  }
  .btn-export {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: var(--font-sans); font-weight: 700; font-size: 14px;
    color: #fff; background: var(--wlc-imperial-red);
    border: none; border-radius: 999px;
    padding: 12px 22px; cursor: pointer;
    box-shadow: var(--shadow-pop);
  }
  .btn-export .ic { width: 18px; height: 18px; color: #fff; display: inline-flex; }
  .btn-export .ic svg { width: 100%; height: 100%; }

  /* ---- VIEW SHELL ---- */
  .view { padding: 30px 40px 50px; display: none; }
  .view.active { display: block; }

  .blk { margin-bottom: 30px; }
  .blk-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; }
  .blk-num {
    font-family: var(--font-numeral); font-size: 32px; line-height: 1;
    color: var(--wlc-chinese-yellow);
    -webkit-text-stroke: 1.4px var(--wlc-space-cadet);
  }
  .blk-title { font-family: var(--font-sans); font-weight: 800; font-size: 24px; letter-spacing: -0.01em; color: var(--fg1); }
  .blk-sub { font-family: var(--font-sans); font-weight: 500; font-size: 14.5px; color: var(--fg2); margin-top: 3px; }

  /* ---- KPI STRIP ---- */
  .kpi-strip { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; }
  @media (min-width: 1500px){ .kpi-strip { grid-template-columns: repeat(4, minmax(0,1fr)); } }
  /* text blocks stay readable on very wide screens */
  .goal-desc, .verdict .v-body p, .info-card p, .habito .h-text { max-width: 760px; }
  .kpi {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 18px 20px;
    box-shadow: var(--shadow-sm);
  }
  .kpi.star { background: var(--wlc-space-cadet); border-color: var(--wlc-space-cadet); }
  .kpi .kpi-ic { width: 22px; height: 22px; margin-bottom: 11px; color: var(--wlc-skobeloff); display: inline-flex; }
  .kpi.star .kpi-ic { color: var(--wlc-chinese-yellow); }
  .kpi .kpi-ic svg { width: 100%; height: 100%; }
  .kpi-num { font-family: var(--font-numeral); font-size: 36px; line-height: 1; color: var(--wlc-space-cadet); }
  .kpi.star .kpi-num { color: var(--wlc-chinese-yellow); }
  .kpi-num .unit { font-size: 19px; }
  .kpi-num .grow { font-family: var(--font-numeral); font-size: 16px; color: var(--wlc-skobeloff); margin-left: 6px; }
  .kpi-label { font-family: var(--font-sans); font-weight: 500; font-size: 12.5px; color: var(--fg2); margin-top: 8px; line-height: 1.35; }
  .kpi.star .kpi-label { color: var(--wlc-powder-blue); }

  /* ---- KPI chromatic tones (WLC §2 palette) ----
     Each non-star card carries one brand hue: a tinted surface, a colored
     icon badge, an accent stripe and a brand decorative icon watermark.
     Number colors respect WCAG AA (amber uses the darkened warn-text token). */
  .kpi { position: relative; overflow: hidden; }
  .kpi .kpi-ic {
    width: 38px; height: 38px; padding: 8px; border-radius: 11px;
    background: rgba(2,112,113,0.10); margin-bottom: 12px;
    align-items: center; justify-content: center;
  }
  .kpi-watermark {
    position: absolute; right: -14px; bottom: -16px;
    width: 96px; height: 96px; opacity: 0.10; pointer-events: none; z-index: 0;
  }
  .kpi-watermark svg { width: 100%; height: 100%; }
  .kpi > .kpi-num, .kpi > .kpi-label, .kpi > .kpi-ic { position: relative; z-index: 1; }

  .kpi.tone-teal   { background: #E3F2EE; border-color: rgba(2,112,113,0.22); }
  .kpi.tone-teal   .kpi-ic { color: var(--wlc-skobeloff); background: rgba(2,112,113,0.14); }
  .kpi.tone-teal   .kpi-num { color: var(--wlc-skobeloff); }
  .kpi.tone-teal   .kpi-watermark { color: var(--wlc-skobeloff); }

  .kpi.tone-blue   { background: #E1ECF7; border-color: rgba(33,100,174,0.22); }
  .kpi.tone-blue   .kpi-ic { color: var(--wlc-green-blue); background: rgba(33,100,174,0.14); }
  .kpi.tone-blue   .kpi-num { color: var(--wlc-green-blue); }
  .kpi.tone-blue   .kpi-watermark { color: var(--wlc-green-blue); }
  .kpi.tone-blue   .kpi-num .grow { color: var(--wlc-green-blue); }

  .kpi.tone-amber  { background: #FDF0D5; border-color: rgba(252,180,21,0.40); }
  .kpi.tone-amber  .kpi-ic { color: #8A540A; background: rgba(252,180,21,0.24); }
  .kpi.tone-amber  .kpi-num { color: #8A540A; }
  .kpi.tone-amber  .kpi-watermark { color: var(--wlc-chinese-yellow); opacity: 0.16; }
  .kpi.tone-amber  .kpi-label { color: #6f4408; }
  .kpi.tone-amber  .kpi-num .grow { color: #8A540A; }

  .kpi.star { background: var(--wlc-space-cadet); }
  .kpi.star .kpi-ic { color: var(--wlc-chinese-yellow); background: rgba(252,180,21,0.18); }
  .kpi.star .kpi-watermark { color: var(--wlc-chinese-yellow); opacity: 0.14; }

  /* ---- GOAL CARD ---- */
  .goal-card {
    background: var(--wlc-imperial-red); color: #fff;
    border-radius: var(--radius-card); padding: 28px 32px;
    box-shadow: var(--shadow-pop);
    position: relative; overflow: hidden;
    display: grid; grid-template-columns: 1.35fr 1fr; gap: 30px; align-items: center;
  }
  .goal-art { position: absolute; right: -26px; bottom: -30px; width: 180px; opacity: 0.55; z-index: 0; pointer-events: none; }
  .goal-left { position: relative; z-index: 2; }
  .goal-tag {
    display: inline-block; font-family: var(--font-sans); font-weight: 700;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--wlc-space-cadet); background: var(--wlc-chinese-yellow);
    padding: 6px 12px; border-radius: 999px; margin-bottom: 14px;
  }
  .goal-title { font-family: var(--font-sans); font-weight: 800; font-size: 27px; line-height: 1.1; color: #fff; }
  .goal-desc { font-family: var(--font-sans); font-weight: 500; font-size: 14.5px; line-height: 1.55; color: rgba(255,255,255,0.94); margin-top: 12px; max-width: 480px; }
  .goal-desc b { color: var(--wlc-chinese-yellow); }

  .goal-right { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 16px; }
  .goal-stat-row { display: flex; gap: 14px; }
  .goal-stat { flex: 1; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.22); border-radius: 14px; padding: 14px 16px; }
  .goal-stat .gn { font-family: var(--font-numeral); font-size: 30px; line-height: 1; color: #fff; }
  .goal-stat .gn .sep { color: rgba(255,255,255,0.6); font-size: 22px; }
  .goal-stat .gl { font-family: var(--font-sans); font-weight: 500; font-size: 12px; color: rgba(255,255,255,0.88); margin-top: 6px; line-height: 1.3; }
  .goal-bar-wrap { }
  .goal-bar-head { display: flex; justify-content: space-between; font-family: var(--font-sans); font-weight: 600; font-size: 12.5px; color: #fff; margin-bottom: 7px; }
  .goal-bar-head .pct { font-family: var(--font-numeral); color: var(--wlc-chinese-yellow); font-size: 15px; }
  .goal-bar { height: 14px; background: rgba(255,255,255,0.20); border-radius: 999px; overflow: hidden; }
  .goal-bar > i { display: block; height: 100%; background: var(--wlc-chinese-yellow); border-radius: 999px; }

  /* ---- CHART CARD ---- */
  .chart-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 24px 28px 18px;
    box-shadow: var(--shadow-md);
  }
  .chart-svg { width: 100%; height: auto; display: block; }
  .chart-legend { display: flex; gap: 22px; margin-top: 12px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 7px; font-family: var(--font-sans); font-size: 12.5px; color: var(--fg2); font-weight: 500; }
  .leg .dot { width: 11px; height: 11px; border-radius: 999px; }

  .snapshot {
    display: flex; align-items: center; gap: 32px;
    flex-wrap: wrap;
  }
  .snapshot .snap-big {
    font-family: var(--font-numeral); font-size: 76px; line-height: 0.95;
    color: var(--wlc-space-cadet);
  }
  .snapshot .snap-big .unit { font-size: 34px; color: var(--wlc-imperial-red); }
  .snap-meta { flex: 1; min-width: 240px; }
  .snap-meta .sm-label { font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--wlc-imperial-red); }
  .snap-meta .sm-note { font-family: var(--font-sans); font-weight: 500; font-size: 14.5px; line-height: 1.5; color: var(--fg2); margin-top: 8px; }
  .snap-side { display: flex; gap: 16px; }
  .snap-side .ss { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; }
  .snap-side .ss .n { font-family: var(--font-numeral); font-size: 26px; line-height: 1; color: var(--wlc-skobeloff); }
  .snap-side .ss .l { font-family: var(--font-sans); font-weight: 500; font-size: 12px; color: var(--fg2); margin-top: 5px; }

  /* ---- TABLE ---- */
  .tbl-wrap { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-md); }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--wlc-space-cadet); color: var(--wlc-powder-blue);
    font-family: var(--font-sans); font-weight: 700; font-size: 11px;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 13px 16px; text-align: left;
  }
  thead th.r, tbody td.r { text-align: right; }
  thead th.c, tbody td.c { text-align: center; }
  tbody td { padding: 12px 16px; font-size: 13.5px; border-top: 1px solid var(--border); color: var(--fg1); font-weight: 500; }
  tbody td.num { font-family: var(--font-numeral); font-size: 14.5px; letter-spacing: 0.01em; color: var(--wlc-space-cadet); }
  tbody tr:nth-child(even) { background: var(--wlc-alabaster); }
  tbody tr.viral-row { background: #FDEAE3; }
  tbody tr.viral-row td { font-weight: 700; }
  .tema { color: var(--fg1); font-weight: 500; max-width: 320px; }
  .tema .dt { display: block; font-family: var(--font-sans); font-weight: 500; font-size: 11.5px; color: var(--fg3); margin-top: 2px; }
  .badge-v { display: inline-block; font-family: var(--font-sans); font-size: 10px; font-weight: 800; letter-spacing: 0.06em; color: #fff; background: var(--wlc-imperial-red); padding: 2px 7px; border-radius: 999px; margin-left: 6px; vertical-align: middle; }
  .cmt-cell {
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    font-family: var(--font-numeral); font-size: 14.5px;
    min-width: 64px; padding: 5px 10px; border-radius: 999px;
  }
  .cmt-cell.ok { background: rgba(2,112,113,0.16); color: var(--wlc-skobeloff); }
  .cmt-cell.err { background: rgba(231,64,65,0.14); color: var(--wlc-imperial-red); }
  .empty-cell { font-family: var(--font-sans); font-size: 12px; color: var(--fg3); font-style: italic; }
  .tbl-note {
    font-family: var(--font-sans); font-weight: 500; font-size: 12.5px;
    color: var(--fg2); line-height: 1.5; padding: 14px 16px;
    background: var(--wlc-alabaster); border-top: 1px solid var(--border);
  }
  .tbl-note b { color: var(--fg1); }

  /* ============================================================
     PEDIDOS — cards de comentário (estilo print)
     ============================================================ */
  .pedidos-grid {
    display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px;
  }
  @media (max-width: 1280px){ .pedidos-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
  .ped-card {
    position: relative;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 16px 16px 14px;
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column; gap: 12px;
  }
  /* Linha de comentário ao estilo Instagram: avatar redondo · nome bold inline
     com o texto · coração de curtidas à direita · meta (data + curtidas) abaixo. */
  .ped-row { display: flex; align-items: flex-start; gap: 11px; }
  .ped-avatar {
    width: 40px; height: 40px; flex: 0 0 auto; border-radius: 50%;
    object-fit: cover; background: var(--wlc-alabaster);
    border: 1px solid var(--border);
  }
  .ped-avatar-ph {
    width: 40px; height: 40px; flex: 0 0 auto; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-numeral); font-size: 18px; color: #fff;
  }
  .ped-body { flex: 1; min-width: 0; }
  .ped-line { line-height: 1.5; }
  .ped-handle {
    font-family: var(--font-sans); font-weight: 700; font-size: 14px;
    color: var(--wlc-space-cadet); margin-right: 6px; word-break: break-word;
  }
  .ped-text {
    font-family: var(--font-sans); font-weight: 400; font-size: 14px;
    color: var(--fg1); overflow-wrap: anywhere;
  }
  .ped-meta {
    display: flex; align-items: center; gap: 14px; margin-top: 6px;
    font-family: var(--font-sans); font-weight: 500; font-size: 12px; color: var(--fg3);
  }
  .ped-likes-meta { font-weight: 600; }
  .ped-heart {
    flex: 0 0 auto; display: inline-flex; align-items: center; margin-top: 2px;
    color: var(--wlc-imperial-red);
  }
  .ped-heart .heart { width: 15px; height: 15px; display: inline-block; }
  .ped-foot { display: flex; align-items: center; justify-content: flex-end;
    gap: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .ped-open {
    display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
    font-family: var(--font-sans); font-weight: 600; font-size: 12px;
    color: var(--wlc-green-blue); background: rgba(33,100,174,0.10);
    border: 1px solid rgba(33,100,174,0.22);
    padding: 6px 11px; border-radius: 999px; margin-left: auto;
  }
  .ped-open:hover { background: rgba(33,100,174,0.18); }
  .ped-open .arr { width: 12px; height: 12px; }
  .ped-count {
    display: inline-flex; align-items: center;
    font-family: var(--font-numeral); font-size: 13px; color: var(--wlc-chinese-yellow);
    background: var(--wlc-space-cadet);
    padding: 4px 12px; border-radius: 999px; margin-left: 12px;
    vertical-align: middle; align-self: center;
  }
  .ped-empty {
    background: var(--surface-2); border: 1px dashed var(--border);
    border-radius: var(--radius-card); padding: 32px;
    text-align: center; font-family: var(--font-sans); font-weight: 500;
    font-size: 14.5px; color: var(--fg3);
  }

  /* ============================================================
     INSIGHTS IG — churn, ranking, demografia
     ============================================================ */
  .churn-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 26px 28px;
    box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 30px; flex-wrap: wrap;
  }
  .churn-net { text-align: center; min-width: 200px; }
  .churn-net .cn-big {
    font-family: var(--font-numeral); font-size: 64px; line-height: 1;
    color: var(--wlc-imperial-red);
  }
  .churn-net .cn-tag {
    display: inline-block; margin-top: 10px;
    font-family: var(--font-sans); font-weight: 700; font-size: 11px;
    letter-spacing: 0.10em; text-transform: uppercase;
    color: #B02E2F; background: #FBE5E3; padding: 5px 12px; border-radius: 999px;
  }
  .churn-split { display: flex; gap: 16px; }
  .churn-pill {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 20px; min-width: 130px;
  }
  .churn-pill .cp-n { font-family: var(--font-numeral); font-size: 28px; line-height: 1; }
  .churn-pill.up .cp-n { color: var(--wlc-skobeloff); }
  .churn-pill.down .cp-n { color: var(--wlc-imperial-red); }

  .churn-note {

  .week-strip { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; }

  .rank-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-md); }

  .rank-body { flex: 1; min-width: 0; }

  .demo-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 20px 22px; box-shadow: var(--shadow-sm); }
  .demo-h { font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--wlc-skobeloff); margin-bottom: 16px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-lbl { font-family: var(--font-sans); font-weight: 600; font-size: 12.5px; color: var(--fg1); min-width: 56px; }

  .gender-split { display: flex; height: 26px; border-radius: 999px; overflow: hidden; margin-bottom: 14px; }

  /* ---- VERDICT ---- */
  .verdict {
    display: flex; gap: 18px; align-items: flex-start;

  }
  .verdict .v-ic {

  }
  .verdict .v-ic svg { width: 100%; height: 100%; }
  .verdict .v-body .v-tag { font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--wlc-chinese-yellow); }
  .verdict .v-body p { font-family: var(--font-sans); font-weight: 600; font-size: 18px; line-height: 1.45; color: var(--wlc-alabaster); margin-top: 8px; }

  /* ============================================================
     META & PLANO VIEW
     ============================================================ */
  /* SSOT seal */
  .ssot-seal {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-sans); font-weight: 700; font-size: 11px;
    letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--wlc-skobeloff); background: rgba(2,112,113,0.10);
    border: 1px solid rgba(2,112,113,0.22);

  }
  .ssot-seal .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--wlc-skobeloff); }
  .ssot-seal:hover { background: rgba(2,112,113,0.16); }

  /* Hero da meta */
  .meta-hero {
    background: var(--wlc-space-cadet); color: var(--wlc-alabaster);
    border-radius: var(--radius-card); padding: 36px 40px;
    box-shadow: var(--shadow-lg);
    position: relative; overflow: hidden;
  }
  .meta-hero .mh-art { position: absolute; right: -30px; top: -28px; width: 200px; opacity: 0.42; z-index: 0; pointer-events: none; }
  .meta-hero-inner { position: relative; z-index: 2; }
  .mh-badges { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .mh-badge {
    font-family: var(--font-sans); font-weight: 700; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 12px; border-radius: 999px;
  }
  .mh-badge.status { color: var(--wlc-space-cadet); background: var(--wlc-chinese-yellow); }
  .mh-badge.empresa { color: var(--wlc-alabaster); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.24); }
  .mh-title {
    font-family: var(--font-sans); font-weight: 800; font-size: 44px; line-height: 1.05;
    letter-spacing: -0.015em; color: #fff; max-width: 760px;

  .mh-title .y { color: var(--wlc-chinese-yellow); }
  .mh-bottom { display: flex; align-items: flex-end; gap: 36px; margin-top: 30px; flex-wrap: wrap; }
  .mh-days { flex: 0 0 auto; }
  .mh-days .n { font-family: var(--font-numeral); font-size: 72px; line-height: 0.9; color: var(--wlc-chinese-yellow); }
  .mh-days .n .u { font-size: 26px; color: var(--wlc-powder-blue); }
  .mh-days .l { font-family: var(--font-sans); font-weight: 500; font-size: 13px; color: var(--wlc-powder-blue); margin-top: 6px; }
  .mh-bar-wrap { flex: 1; min-width: 280px; }
  .mh-bar-head { display: flex; justify-content: space-between; font-family: var(--font-sans); font-weight: 600; font-size: 12.5px; color: var(--wlc-powder-blue); margin-bottom: 8px; }
  .mh-bar-head .pct { font-family: var(--font-numeral); color: var(--wlc-chinese-yellow); font-size: 15px; }
  .mh-bar { height: 14px; background: rgba(255,255,255,0.16); border-radius: 999px; overflow: hidden; }
  .mh-bar > i { display: block; height: 100%; background: var(--wlc-chinese-yellow); border-radius: 999px; }

  /* Two-up card row */
  .meta-2up { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .info-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 24px 26px; box-shadow: var(--shadow-sm);
  }
  .info-card.flag { border-left: 5px solid var(--wlc-chinese-yellow); background: var(--wlc-cream); }
  .info-card .ic-lbl {
    font-family: var(--font-sans); font-weight: 700; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--wlc-imperial-red); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .info-card.flag .ic-lbl { color: var(--wlc-skobeloff); }
  .info-card p { font-family: var(--font-sans); font-weight: 500; font-size: 15px; line-height: 1.6; color: var(--fg1); }

  /* Hábito card (accent) */
  .habito {
    background: var(--wlc-imperial-red); color: #fff;
    border-radius: var(--radius-card); padding: 28px 30px; box-shadow: var(--shadow-pop);
  }
  .habito .h-lbl { font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--wlc-chinese-yellow); margin-bottom: 12px; }
  .habito .h-text { font-family: var(--font-sans); font-weight: 600; font-size: 17px; line-height: 1.55; color: #fff; max-width: 720px; }
  .habito .h-text b { color: var(--wlc-chinese-yellow); }
  .habito .h-8h {
    display: inline-block; font-family: var(--font-numeral); font-size: 20px;
    color: var(--wlc-space-cadet); background: var(--wlc-chinese-yellow);
    padding: 1px 12px; border-radius: 999px; vertical-align: middle;
  }
  .habito-mini { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 22px; }
  .hm {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.24);
    border-radius: 16px; padding: 16px 18px; display: flex; align-items: center; gap: 14px;
  }
  .hm .hm-ic {
    width: 38px; height: 38px; flex: 0 0 auto; padding: 8px; border-radius: 11px;
    background: rgba(255,255,255,0.15); color: var(--wlc-chinese-yellow);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .hm .hm-ic svg { width: 100%; height: 100%; }
  .hm .hm-n { font-family: var(--font-numeral); font-size: 22px; line-height: 1; color: var(--wlc-chinese-yellow); }
  .hm .hm-t { font-family: var(--font-sans); font-weight: 700; font-size: 14px; color: #fff; margin-top: 4px; }

  /* Milestones trail */
  .milestones { position: relative; }
  .ms-item {
    display: flex; align-items: flex-start; gap: 18px; padding: 16px 20px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); box-shadow: var(--shadow-sm);
    margin-bottom: 12px; position: relative; z-index: 2;
  }
  .ms-num {
    flex: 0 0 auto; width: 46px; height: 46px; border-radius: 999px;
    background: var(--wlc-alabaster); border: 2px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-numeral); font-size: 24px; color: var(--wlc-space-cadet);
  }
  .ms-body { flex: 1; min-width: 0; padding-top: 6px; }
  .ms-body .mt { font-family: var(--font-sans); font-weight: 700; font-size: 15.5px; color: var(--fg1); }
  .ms-status {
    flex: 0 0 auto; align-self: center;
    font-family: var(--font-sans); font-weight: 700; font-size: 10.5px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg2);
    background: var(--wlc-alabaster); border: 1px solid var(--border);
    padding: 5px 11px; border-radius: 999px;
  }
  .ms-svg { position: absolute; left: 0; top: 0; width: 60px; height: 100%; z-index: 1; pointer-events: none; }

  /* Regra central banner */
  .regra {
    display: flex; gap: 18px; align-items: flex-start;
    background: var(--wlc-chinese-yellow); color: var(--wlc-space-cadet);
    border-radius: var(--radius-card); padding: 24px 30px; box-shadow: var(--shadow-md);
  }
  .regra .r-ic {
    flex: 0 0 auto; width: 44px; height: 44px; padding: 9px; border-radius: 12px;
    background: rgba(36,34,88,0.12); color: var(--wlc-space-cadet);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .regra .r-ic svg { width: 100%; height: 100%; }
  .regra .r-tag { font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--wlc-imperial-red); }
  .regra .r-text { font-family: var(--font-sans); font-weight: 700; font-size: 18px; line-height: 1.45; color: var(--wlc-space-cadet); margin-top: 7px; }

  /* Projetos chips */
  .proj-grid { display: flex; flex-wrap: wrap; gap: 14px; }
  .proj-chip {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-left: 5px solid var(--wlc-green-blue);
    border-radius: var(--radius-card); padding: 16px 20px; box-shadow: var(--shadow-sm);
    min-width: 280px;
  }
  .proj-chip .pc-ic { width: 34px; height: 34px; flex: 0 0 auto; padding: 6px; border-radius: 10px; background: rgba(33,100,174,0.12); color: var(--wlc-green-blue); display: inline-flex; align-items: center; justify-content: center; }
  .proj-chip .pc-ic svg { width: 100%; height: 100%; }
  .proj-chip .pc-name { font-family: var(--font-sans); font-weight: 800; font-size: 16px; color: var(--fg1); }
  .proj-chip .pc-desc { font-family: var(--font-sans); font-weight: 500; font-size: 13px; color: var(--fg2); margin-top: 2px; }

  /* Empty state — calendário */
  .empty-state {
    background: var(--surface-2); border: 1.5px dashed var(--border);
    border-radius: var(--radius-card); padding: 40px 34px; text-align: center;
  }
  .empty-state .es-ic {
    width: 54px; height: 54px; margin: 0 auto 16px; padding: 13px; border-radius: 14px;
    background: var(--wlc-alabaster); color: var(--wlc-ink-40);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .empty-state .es-ic svg { width: 100%; height: 100%; }
  .empty-state .es-title { font-family: var(--font-sans); font-weight: 800; font-size: 18px; color: var(--fg1); }
  .empty-state .es-note { font-family: var(--font-sans); font-weight: 500; font-size: 14px; line-height: 1.55; color: var(--fg2); max-width: 480px; margin: 10px auto 20px; }
  .empty-state .es-src { font-family: var(--font-sans); font-weight: 500; font-size: 11.5px; color: var(--fg3); margin-bottom: 18px; }
  .btn-notion {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: var(--font-sans); font-weight: 700; font-size: 14px;
    color: #fff; background: var(--wlc-space-cadet);
    border: none; border-radius: 999px; padding: 12px 22px; cursor: pointer;
    text-decoration: none; box-shadow: var(--shadow-sm);
  }
  .btn-notion .ic { width: 17px; height: 17px; color: var(--wlc-chinese-yellow); display: inline-flex; }
  .btn-notion .ic svg { width: 100%; height: 100%; }

  /* ============================================================
     THUMBNAILS EM TABELAS
     ============================================================ */
  .thumb-cell { width: 1%; white-space: nowrap; padding-right: 0; }
  .thumb {
    display: block; border-radius: 8px; object-fit: cover;
    background: var(--wlc-alabaster); border: 1px solid var(--border);
  }
  .thumb.vert { width: 48px; height: 64px; }
  .thumb.horiz { width: 64px; height: 36px; }
  .thumb-ph {
    display: flex; align-items: center; justify-content: center;
    color: var(--wlc-ink-40); background: var(--wlc-alabaster);
  }
  .thumb-ph svg { width: 55%; height: 55%; }
  .thumb-link {
    position: relative; display: block; border-radius: 8px; overflow: hidden;
    cursor: pointer;
  }
  .thumb-link .thumb { border-radius: 0; transition: transform .15s, filter .15s; }
  .thumb-link:hover .thumb { transform: scale(1.05); filter: brightness(0.78); }
  .thumb-link:focus-visible { outline: 2px solid var(--wlc-green-blue); outline-offset: 2px; }
  .thumb-play {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #fff; opacity: 0; transition: opacity .15s; pointer-events: none;
  }
  .thumb-play svg { width: 42%; height: 42%; filter: drop-shadow(0 1px 3px rgba(36,34,88,0.6)); }
  .thumb-link:hover .thumb-play, .thumb-link:focus-visible .thumb-play { opacity: 1; }
  a.row-link { color: inherit; text-decoration: none; display: block; }
  a.row-link:hover .tt { color: var(--wlc-imperial-red); text-decoration: underline; }
  tbody tr.clickable:hover { background: var(--wlc-cream); }
  .tt { transition: color .12s; }

  /* ============================================================
     CARDS RICOS — VIEW INSTAGRAM (auditoria)
     ============================================================ */
  /* O veredito */
  .verd-grid { display: grid; grid-template-columns: 1.25fr 1fr; gap: 18px; align-items: stretch; }
  .verd-big {
    background: var(--wlc-imperial-red); color: #fff;
    border-radius: var(--radius-card); padding: 30px 34px;
    box-shadow: var(--shadow-pop); position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center;
  }
  .verd-big .vb-tag { font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--wlc-chinese-yellow); margin-bottom: 14px; }
  .verd-big .vb-quote { font-family: var(--font-sans); font-weight: 800; font-size: 28px; line-height: 1.18; color: #fff; max-width: 560px; }
  .verd-big .vb-art { position: absolute; right: -28px; bottom: -32px; width: 170px; opacity: 0.5; pointer-events: none; }
  .verd-side { display: grid; grid-template-rows: 1fr 1fr; gap: 18px; }
  .verd-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 20px 22px; box-shadow: var(--shadow-sm);
    border-left: 5px solid var(--wlc-skobeloff);
  }
  .verd-card.bad { border-left-color: var(--wlc-imperial-red); }
  .verd-card .vc-lbl { font-family: var(--font-sans); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--wlc-skobeloff); display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .verd-card.bad .vc-lbl { color: var(--wlc-imperial-red); }
  .verd-card .vc-lbl .chalk { font-family: var(--font-chalk); font-size: 22px; letter-spacing: 0; text-transform: none; line-height: 1; }
  .verd-card p { font-family: var(--font-sans); font-weight: 500; font-size: 14px; line-height: 1.55; color: var(--fg1); }

  /* A fórmula de ouro */
  .formula-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .fcard {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 22px 24px; box-shadow: var(--shadow-md);
    display: flex; flex-direction: column; gap: 14px;
  }
  .fcard .f-head { display: flex; align-items: flex-start; gap: 14px; }
  .fcard .f-rank {
    font-family: var(--font-numeral); font-size: 30px; line-height: 1; flex: 0 0 auto;

  .fcard .f-title { font-family: var(--font-sans); font-weight: 800; font-size: 17px; line-height: 1.25; color: var(--fg1); }

  .f-stats { display: flex; gap: 12px; }
  .f-stat { flex: 1; background: var(--wlc-alabaster); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; }
  .f-stat .n { font-family: var(--font-numeral); font-size: 21px; line-height: 1; color: var(--wlc-space-cadet); }
  .f-stat .l { font-family: var(--font-sans); font-weight: 500; font-size: 11px; color: var(--fg2); margin-top: 5px; }
  .f-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .f-tag {
    font-family: var(--font-sans); font-weight: 600; font-size: 11.5px;
    color: var(--wlc-space-cadet); background: var(--wlc-powder-blue);
    padding: 4px 11px; border-radius: 999px;
  }
  .f-why { font-family: var(--font-sans); font-weight: 500; font-size: 13px; line-height: 1.5; color: var(--fg2); }
  .f-why b { color: var(--fg1); font-weight: 700; }

  /* Vence x afunda */
  .va-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .va-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 22px 24px; box-shadow: var(--shadow-sm);
  }
  .va-card .va-head { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }

  .va-card.win .va-ic { color: var(--wlc-skobeloff); background: rgba(2,112,113,0.14); }

/* ============================================================
   HELPERS
   ============================================================ */
function fmt(n){ return n.toLocaleString('pt-BR'); }
function fmtShort(n){
  if (n >= 1e6) return (n/1e6).toFixed(n>=1e7?0:1).replace('.', ',') + ' mi';
  if (n >= 1e3) return (n/1e3).toFixed(n>=1e5?0:1).replace('.', ',') + ' mil';
  return fmt(n);
}
function fmtDur(s){
  if (!s && s !== 0) return '—';
  if (s < 60) return s + ' s';
  const m = Math.floor(s/60), r = s % 60;
  return m + 'm' + (r ? (' ' + r + 's') : '');
}
function fmtDate(iso){
  const [y,m,d] = iso.split('-');
  return d + '/' + m;
}
// ISO week start (Monday) for a date
function weekStart(d){
  const dt = new Date(d + 'T00:00:00');
  const day = (dt.getDay() + 6) % 7; // Mon=0
  dt.setDate(dt.getDate() - day);
  return dt;
}
function weekKey(iso){
  const ws = weekStart(iso);
  return ws.toISOString().slice(0,10);
}
const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function weekLabel(key){
  const ws = new Date(key + 'T00:00:00');
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const dd = n => String(n).padStart(2,'0');
  return 'Semana de ' + dd(ws.getDate()) + '–' + dd(we.getDate()) + '/' + MESES[we.getMonth()];
}
function svgIcon(name){ return WLC.icon(name); }
function thumbCell(it, shape){ // shape: 'vert' (IG/TikTok) | 'horiz' (YouTube)
  const cls = 'thumb ' + shape;
  let media;
  if (it.thumb){
    media = '<img class="' + cls + '" src="' + it.thumb + '" alt="Miniatura do conteúdo" loading="lazy">';
  } else {
    media = '<span class="' + cls + ' thumb-ph">' + svgIcon('nuvem-vermelha') + '</span>';
  }
  // Miniatura clicável → abre o post original em nova aba.
  if (it.url){
    media = '<a class="thumb-link" href="' + it.url + '" target="_blank" rel="noopener" ' +
            'title="Abrir o conteúdo original em nova aba">' + media +
            '<span class="thumb-play" aria-hidden="true">' + svgIcon('estrela-bussola') + '</span></a>';
  }
  return '<td class="thumb-cell">' + media + '</td>';
}
function titleLink(text, url, extra){
  const inner = '<span class="tt">' + text + '</span>' + (extra || '');
  if (url) return '<a class="row-link" href="' + url + '" target="_blank" rel="noopener">' + inner + '</a>';
  return inner;
}

/* ============================================================
   GROWTH CHART (YouTube real series)
   ============================================================ */
function growthChartYT(serie){
  const W = 1080, H = 320, pl = 70, pr = 30, pt = 24, pb = 40;
  const xs = pl, xe = W - pr, ys = pt, ye = H - pb;
  const vals = serie.map(s => s.seguidores);
  const min = Math.min(...vals), max = Math.max(...vals);
  const x = i => xs + (xe - xs) * (i / (serie.length - 1));
  const y = v => ye - (ye - ys) * ((v - min) / (max - min || 1));
  let line = '', area = '';
  serie.forEach((s,i) => {
    const px = x(i).toFixed(1), py = y(s.seguidores).toFixed(1);
    line += (i===0?'M':'L') + px + ',' + py + ' ';
  });
  area = 'M' + x(0).toFixed(1) + ',' + ye + ' ' +
    serie.map((s,i)=> 'L'+x(i).toFixed(1)+','+y(s.seguidores).toFixed(1)).join(' ') +
    ' L' + x(serie.length-1).toFixed(1) + ',' + ye + ' Z';
  // gridlines (4)
  let grid='', ylab='';
  for (let g=0; g<=4; g++){
    const gy = (ys + (ye-ys)*g/4).toFixed(1);
    const gv = max - (max-min)*g/4;
    grid += '<line x1="'+xs+'" y1="'+gy+'" x2="'+xe+'" y2="'+gy+'" stroke="#E6DDD3" stroke-width="1"/>';
    ylab += '<text x="'+(xs-10)+'" y="'+(parseFloat(gy)+4)+'" font-size="12" fill="rgba(36,34,88,0.40)" font-weight="500" text-anchor="end" font-family="Chaloopswoo, sans-serif">'+fmtShort(Math.round(gv))+'</text>';
  }
  // x labels (first, mid, last few)
  let xlab='';
  serie.forEach((s,i)=>{
    if (i % 3 === 0 || i === serie.length-1){
      xlab += '<text x="'+x(i).toFixed(1)+'" y="'+(H-14)+'" font-size="11" fill="rgba(36,34,88,0.40)" font-weight="500" text-anchor="middle" font-family="Chaloopswoo, sans-serif">'+fmtDate(s.data)+'</text>';
    }
  });
  // dots
  let dots='';
  serie.forEach((s,i)=>{ dots += '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(s.seguidores).toFixed(1)+'" r="'+(i===serie.length-1?6:3.5)+'" fill="#E74041"/>'; });
  return '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">' +
    '<defs><linearGradient id="ytFill" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#E74041" stop-opacity="0.28"/>' +
      '<stop offset="100%" stop-color="#E74041" stop-opacity="0"/></linearGradient></defs>' +
    grid + ylab +
    '<path d="'+area+'" fill="url(#ytFill)"/>' +
    '<path d="'+line+'" stroke="#E74041" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round"/>' +
    dots + xlab +
    '</svg>';
}

const PED_AVATAR_COLORS = ['#E74041','#2164AE','#FCB415','#027071','#7C287B','#EB6952','#242258','#9FD9D8'];
function pedAvatarColor(handle){
  let h = 0;
  for (let i=0;i<handle.length;i++) h = (h*31 + handle.charCodeAt(i)) >>> 0;
  return PED_AVATAR_COLORS[h % PED_AVATAR_COLORS.length];
}
function heartIcon(){
  return '<svg class="heart" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 21s-7.5-4.9-10-9.3C.4 8.6 1.7 5 5.2 5c2 0 3.4 1.2 4.3 2.4l.9 1.2.9-1.2C12.2 6.2 13.6 5 15.6 5c3.5 0 4.8 3.6 3.2 6.7C19.5 16.1 12 21 12 21z"/></svg>';
}

function pedCard(it){

    ? '<img class="ped-avatar" src="'+it.avatar+'" alt="Avatar de '+handle+'" loading="lazy">'

    ? parseInt(it.data.slice(8,10),10) + ' ' + MESES[parseInt(it.data.slice(5,7),10)-1]

    ? '<span class="ped-heart" title="'+fmt(it.likes)+' curtida'+(it.likes===1?'':'s')+'">'+heartIcon()+'</span>'

/* Chromatic tone per KPI position (WLC §2 palette). Star KPI keeps the
   space-cadet treatment; the other three rotate teal / blue / amber. */
const KPI_TONES = ['tone-teal', 'tone-blue', 'tone-amber'];
function kpiStrip(kpis){
  let ti = 0;
  return '<div class="kpi-strip">' + kpis.map(k => {
    const cls = k.star ? 'star' : KPI_TONES[ti++ % KPI_TONES.length];
    return '<div class="kpi '+cls+'">' +
      '<span class="kpi-ic">'+svgIcon(k.icon)+'</span>' +
      '<div class="kpi-num">'+k.num+'</div>' +
      '<div class="kpi-label">'+k.label+'</div>' +
      '<span class="kpi-watermark" aria-hidden="true">'+svgIcon(k.icon)+'</span>' +
    '</div>';
  }).join('') + '</div>';
}

function pctGoal(items){
  const total = items.length;
  const hits = items.filter(i => i.comments !== null && i.comments >= 100).length;
  return { total, hits, pct: total ? Math.round(hits/total*100) : 0 };
}

/* ============================================================
   SCATTER — duração × views (escala log)
   ============================================================ */
function scatterDurViews(items){
  const W = 1080, H = 380, pl = 78, pr = 28, pt = 24, pb = 52;
  const xs = pl, xe = W - pr, ys = pt, ye = H - pb;
  const pts = items.filter(d => d.dur > 0 && d.plays > 0);
  const lx = v => Math.log10(v);
  const xmin = lx(8), xmax = lx(600);   // duração 8s → 600s
  const ymin = lx(5000), ymax = lx(5000000); // views
  const X = d => xs + (xe-xs) * ((lx(d.dur)-xmin)/(xmax-xmin));
  const Y = d => ye - (ye-ys) * ((lx(d.plays)-ymin)/(ymax-ymin));
  // gridlines + y labels (log decades)
  let grid='', ylab='', xlab='';
  [10000,100000,1000000].forEach(v=>{
    const gy = (ye - (ye-ys)*((lx(v)-ymin)/(ymax-ymin))).toFixed(1);
    grid += '<line x1="'+xs+'" y1="'+gy+'" x2="'+xe+'" y2="'+gy+'" stroke="#E6DDD3" stroke-width="1"/>';
    ylab += '<text x="'+(xs-12)+'" y="'+(parseFloat(gy)+4)+'" font-size="12" fill="rgba(36,34,88,0.40)" font-weight="500" text-anchor="end" font-family="Chaloopswoo, sans-serif">'+fmtShort(v).replace('.', ',')+'</text>';
  });
  [10,30,60,120,300,600].forEach(s=>{
    const gx = (xs + (xe-xs)*((lx(s)-xmin)/(xmax-xmin))).toFixed(1);
    xlab += '<text x="'+gx+'" y="'+(H-22)+'" font-size="11" fill="rgba(36,34,88,0.40)" font-weight="500" text-anchor="middle" font-family="Chaloopswoo, sans-serif">'+(s<60?s+'s':(s/60)+'m')+'</text>';
  });
  // trend line (linear regression on log-log), dashed
  const n = pts.length;
  const mx = pts.reduce((a,d)=>a+lx(d.dur),0)/n;
  const my = pts.reduce((a,d)=>a+lx(d.plays),0)/n;
  let num=0, den=0;
  pts.forEach(d=>{ num += (lx(d.dur)-mx)*(lx(d.plays)-my); den += Math.pow(lx(d.dur)-mx,2); });
  const slope = num/den, intc = my - slope*mx;
  const tx1 = xmin, tx2 = xmax;
  const ty = lv => ye - (ye-ys)*(((slope*lv+intc)-ymin)/(ymax-ymin));
  const trend = '<line x1="'+xs+'" y1="'+ty(tx1).toFixed(1)+'" x2="'+xe+'" y2="'+ty(tx2).toFixed(1)+'" stroke="#242258" stroke-width="2.2" stroke-dasharray="9,7" opacity="0.55"/>';
  // dots (red, alpha by recency / mono-alpha fade)
  let dots='';
  pts.forEach(d=>{
    const r = d.viral ? 9 : 6;
    dots += '<circle cx="'+X(d).toFixed(1)+'" cy="'+Y(d).toFixed(1)+'" r="'+r+'" fill="#E74041" fill-opacity="'+(d.viral?0.95:0.55)+'" stroke="#fff" stroke-width="1.5"/>';
  });
  return '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">' +
    grid + ylab + xlab + trend + dots +
    '<text x="'+xs+'" y="14" font-size="11" fill="rgba(36,34,88,0.40)" font-weight="700" font-family="Lufga, sans-serif" letter-spacing="0.06em">VIEWS (LOG)</text>' +
    '<text x="'+xe+'" y="'+(H-4)+'" font-size="11" fill="rgba(36,34,88,0.40)" font-weight="700" text-anchor="end" font-family="Lufga, sans-serif" letter-spacing="0.06em">DURAÇÃO (LOG)</text>' +
    '</svg>';
}

    blk('4','Conteúdo','Célula verde = bateu 100 comentários · vermelha = abaixo da meta.', tbl) +
    pedidosBlock(key,'5') +
    verdictBlk() +

}

/* ============================================================
   META & PLANO VIEW
   ============================================================ */
function viewMeta(){
  const m = META.meta;
  const cal = META.calendarioGravacao;

  // SSOT seal
  const seal = '<a class="ssot-seal" href="' + m.url + '" target="_blank" rel="noopener">' +
    '<span class="dot"></span>SSOT · Notion · sincronizado ' + META.sincronizadoEm.split('-').reverse().join('/') + '</a>';

  // Hero
  const heroPct = 0; // nenhum milestone concluído ainda
  const hero =
    '<div class="meta-hero">' +
      '<div class="mh-art wlc-art on-dark">' + WLC.element('mosaico-geometrico-3cor') + '</div>' +
      '<div class="meta-hero-inner">' +
        '<div class="mh-badges">' +
          '<span class="mh-badge status">Meta ' + m.status + '</span>' +
          '<span class="mh-badge empresa">' + m.empresa + '</span>' +
        '</div>' +
        '<div class="mh-title">100 comentários em <span class="y">cada post</span> até 30 de setembro</div>' +
        '<div class="mh-bottom">' +
          '<div class="mh-days"><div class="n">' + DAYS_LEFT + '<span class="u"> dias</span></div>' +
            '<div class="l">restantes até 30/09/2026</div></div>' +
          '<div class="mh-bar-wrap">' +
            '<div class="mh-bar-head"><span>Milestones concluídos</span><span class="pct">0 de 4 · ' + heroPct + '%</span></div>' +
            '<div class="mh-bar"><i style="width:2%"></i></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Por que importa + Definição de pronto (two-up)
  const twoUp =
    '<div class="meta-2up">' +
      '<div class="info-card"><div class="ic-lbl">Por que importa</div><p>' + m.porQueImporta + '</p></div>' +
      '<div class="info-card flag"><div class="ic-lbl">Definição de pronto</div><p>' + m.definicaoDePronto + '</p></div>' +
    '</div>';

  // Hábito — destaque do 8h + 3 mini-cards
  const habTexto = m.habitoUnico
    .replace('às 8h', 'às <span class="h-8h">8h</span>')
    .replace('3 bons conteúdos', '<b>3 bons conteúdos</b>');
  const minis = [
    {icon:'nuvem-vermelha', n:'1', t:'Sequência de stories'},
    {icon:'binoculos',      n:'2', t:'Vídeo YouTube'},
    {icon:'bandeirinha',    n:'3', t:'Reel'}
  ];
  const habito =
    '<div class="habito">' +
      '<div class="h-lbl">O hábito que move a meta</div>' +
      '<div class="h-text">' + habTexto + '</div>' +
      '<div class="habito-mini">' + minis.map(x =>
        '<div class="hm"><span class="hm-ic">' + svgIcon(x.icon) + '</span>' +
        '<div><div class="hm-n">' + x.n + '</div><div class="hm-t">' + x.t + '</div></div></div>'
      ).join('') + '</div>' +
    '</div>';

  // Milestones — trilha numerada com conector SVG
  const N = m.milestones.length;
  const rowH = 87; // approx item height + gap
  const trailH = (N - 1) * rowH + 23;
  const msSvg =
    '<svg class="ms-svg" viewBox="0 0 60 ' + (N*rowH) + '" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">' +
      '<line x1="30" y1="23" x2="30" y2="' + trailH + '" stroke="#E6DDD3" stroke-width="2" stroke-dasharray="6,7"/>' +
    '</svg>';
  const msItems = m.milestones.map(ms =>
    '<div class="ms-item">' +
      '<span class="ms-num">' + ms.n + '</span>' +
      '<div class="ms-body"><div class="mt">' + ms.texto + '</div></div>' +
      '<span class="ms-status">Em aberto</span>' +
    '</div>'
  ).join('');
  const milestones = '<div class="milestones">' + msSvg + msItems + '</div>';

  // Regra central
  const regra =
    '<div class="regra"><span class="r-ic">' + svgIcon('cordilheira-bicolor') + '</span>' +
      '<div><div class="r-tag">Regra central</div><div class="r-text">' + m.regraCentral + '</div></div>' +
    '</div>';

  // Projetos vinculados — dinâmico do array
  const projChips = m.projetos.map(pj =>
    '<div class="proj-chip"><span class="pc-ic">' + svgIcon('escadaria') + '</span>' +
      '<div><div class="pc-name">' + pj.nome + '</div><div class="pc-desc">' + pj.desc + '</div></div>' +
    '</div>'
  ).join('');

  // Calendário de gravação — tabela se houver itens, senão empty-state
  let calBlk;
  if (cal.itens && cal.itens.length){
    const rows = cal.itens.map(it =>
      '<tr><td class="tema">' + it.tema + '</td>' +
      '<td>' + it.etapa + '</td>' +
      '<td class="num">' + it.semanaAlvo + '</td>' +
      '<td class="c">' + (it.statusReel || '—') + '</td>' +
      '<td class="c">' + (it.statusCarrossel || '—') + '</td></tr>'
    ).join('');
    calBlk = '<div class="tbl-wrap"><table>' +
      '<thead><tr><th>Tema</th><th>Etapa</th><th class="r">Semana alvo</th><th class="c">Status Reel</th><th class="c">Status Carrossel</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>' +
      '<div class="tbl-note"><b>Fonte:</b> ' + cal.fonte + '</div></div>';
  } else {
    calBlk =
      '<div class="empty-state">' +
        '<span class="es-ic">' + svgIcon('lapide-pedra') + '</span>' +
        '<div class="es-title">Calendário ainda vazio</div>' +
        '<div class="es-note">' + cal.nota + '</div>' +
        '<div class="es-src">' + cal.fonte + '</div>' +
        '<a class="btn-notion" href="' + cal.url + '" target="_blank" rel="noopener">' +
          '<span class="ic">' + svgIcon('mapa-chile') + '</span> Abrir no Notion</a>' +
      '</div>';
  }

  return '<section class="view active" data-view="meta">' +
    seal +
    blk('1','Meta de Q3','A meta única do trimestre — fonte de verdade no Notion.', hero) +
    blk('2','Contexto','Por que essa meta importa e o que conta como pronto.', twoUp) +
    blk('3','O hábito','A ação diária que move tudo — manhã é para câmera.', habito) +
    blk('4','Milestones','Trilha até a meta final · nenhum concluído ainda.', milestones) +
    blk('5','Regra central','A linha que não pode ser cruzada.', regra) +
    blk('6','Projetos vinculados','Iniciativas que sustentam a meta.', '<div class="proj-grid">' + projChips + '</div>') +
    blk('7','Calendário de gravação','Sincronizado pelo job de sexta a partir do Notion.', calBlk) +
  '</section>';
}

/* ============================================================
   VIEW DE PROJETO
   ============================================================ */
function respClass(r){
  const s = (r||'').toLowerCase();
  if (s.indexOf('+') >= 0 || (s.indexOf('laíse')>=0 && s.indexOf('equipe')>=0)) return 'ambos';
  if (s.indexOf('equipe') >= 0) return 'equipe';
  return 'laise';
}
function cadencia(at){
  if (!at.definida) return { txt: 'a definir', tbd: true };
  if (at.unidade === 'diária') return { txt: 'diária', tbd: false };
  if (at.meta == null || at.unidade === 'a definir') return { txt: 'a definir', tbd: true };
  const u = at.unidade.replace('por semana','/semana');
  return { txt: at.meta + ' ' + u, tbd: false };
}
function viewProjeto(id){
  const pj = PROJETOS.projetos.find(x => x.id === id);
  if (!pj) return '<section class="view active"><p style="padding:30px">Projeto não encontrado.</p></section>';

  const hero =
    '<div class="proj-hero">' +
      '<div class="ph-art wlc-art on-dark">' + WLC.element('mosaico-geometrico-3cor') + '</div>' +
      '<div class="proj-hero-inner">' +
        '<div class="ph-name">' + pj.nome + '</div>' +
        '<div class="ph-desc">' + pj.desc + '</div>' +
        '<a class="ssot-seal" href="' + pj.notionUrl + '" target="_blank" rel="noopener">' +
          '<span class="dot"></span>SSOT · Notion</a>' +
      '</div>' +
    '</div>';

  // KPIs — se vazio ou todos zerados, estado claro com notaPipeline
  let kpiBlk;
  const hasKpis = pj.kpis && pj.kpis.length;
  const allZero = hasKpis && pj.kpis.every(k => !k.valor);
  if (hasKpis && !allZero){
    kpiBlk = '<div class="proj-kpis">' + pj.kpis.map(k =>
      '<div class="kpi"><div class="kpi-num">' + k.valor + '</div><div class="kpi-label">' + k.label + '</div></div>'
    ).join('') + '</div>';
  } else {
    kpiBlk =
      '<div class="empty-state">' +
        '<span class="es-ic">' + svgIcon('lapide-pedra') + '</span>' +
        '<div class="es-title">' + (allZero ? 'Pipeline ainda zerado' : 'KPIs ainda não definidos') + '</div>' +
        '<div class="es-note">' + (pj.notaPipeline || 'A definir no Notion.') + '</div>' +
        '<a class="btn-notion" href="' + pj.notionUrl + '" target="_blank" rel="noopener">' +
          '<span class="ic">' + svgIcon('mapa-chile') + '</span> Abrir no Notion</a>' +
      '</div>';
  }

  // Atividades & hábitos — foco da view
  const ativ = '<div class="ativ-list">' + (pj.atividades || []).map(at => {
    const rc = respClass(at.resp);
    const cad = cadencia(at);
    return '<div class="ativ-row' + (cad.tbd ? ' tbd-row' : '') + '">' +
      '<span class="resp-chip ' + rc + '">' + at.resp + '</span>' +
      '<span class="ar-name">' + at.atividade + '</span>' +
      '<span class="cad-chip' + (cad.tbd ? ' tbd' : '') + '">' + cad.txt + '</span>' +
    '</div>';
  }).join('') + '</div>';

  const linkMeta =
    '<div class="ativ-link-meta">' +
      '<span class="alm-ic">' + svgIcon('cordilheira-bicolor') + '</span>' +
      '<div class="alm-t">Estas atividades alimentam a meta de <b>100 comentários por post</b>.</div>' +
    '</div>';

  return '<section class="view active" data-view="proj:' + id + '">' +
    hero +
    blk('1','Indicadores do projeto','Onde o pipeline está hoje — fonte de verdade no Notion.', kpiBlk) +
    blk('2','Atividades & hábitos','As ações recorrentes que sustentam o projeto — por responsável e cadência.', ativ + linkMeta) +
  '</section>';
}

/* ============================================================
   RENDER
   ============================================================ */
function renderView(){
  const views = document.getElementById('views');
  let html;
  if (CURRENT==='meta') html = viewMeta();
  else if (CURRENT.indexOf('proj:')===0) html = viewProjeto(CURRENT.slice(5));
  else if (CURRENT==='instagram') html = viewInstagram();
  else if (CURRENT==='youtube') html = viewYoutube();
  else html = viewTiktok();
  views.innerHTML = html;

  if (CURRENT==='meta'){
    document.getElementById('tbPlat').textContent = 'Meta & Plano';
  } else if (CURRENT.indexOf('proj:')===0){
    const pj = PROJETOS.projetos.find(x=>x.id===CURRENT.slice(5));
    document.getElementById('tbPlat').textContent = pj ? pj.nome : 'Projeto';
  } else {
    document.getElementById('tbPlat').textContent = PLATFORMS.find(p=>p.key===CURRENT).name;
  }
}

function switchView(key){
  if (key === CURRENT) return;
  CURRENT = key;
  WEEK = 'all';
  buildSidebar();
  buildWeekSelect();
  renderView();
}

/* boot */
buildSidebar();
buildWeekSelect();
renderView();
</script>
